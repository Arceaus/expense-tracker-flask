<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #6366f1, #0ea5e9, #14b8a6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: "Poppins", sans-serif;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      color: white;
      border-radius: 25px;
      padding: 50px 40px;
      max-width: 700px;
      text-align: center;
    }
    .inner-box {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      margin-top: 20px;
      box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.1);
    }
    .btn-custom {
      background-color: #ffffff;
      color: #4f46e5;
      font-weight: 600;
      border: none;
      transition: 0.3s ease-in-out;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.3);
    }
    .btn-custom:hover {
      background-color: #e0e7ff;
      color: #3730a3;
    }
    footer {
      margin-top: 25px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>

<body>
  <div class="glass-card">
    <h1 class="fw-bold mb-3 display-5">💰 Expense Tracker</h1>
    <p class="lead text-white-50 mb-4">
      Track, manage, and understand your spending habits
    </p>

    <div class="inner-box">
      <h2 class="fw-semibold mb-2 fs-3">View Your Expenses</h2>
      <p class="text-white-50 mb-4">
        All your saved data is currently stored safely in <b>Expenses.txt</b>.
      </p>
      <a href="{{ url_for('add') }}" class="btn btn-custom px-5 py-2 rounded-pill">
        ➕ Add New Expense
      </a>
    </div>

    <footer class="mt-4">
      Made with ❤️ using Flask & Bootstrap
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
